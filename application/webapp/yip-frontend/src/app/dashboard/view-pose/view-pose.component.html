
    <div class="poseDisplay container p-0">
        <div class="row no-gutters">
            <div class="col-lg-6 col-sm-12" align="left">
                    <img class="img-fluid poseImg" src="{{ selectedPose.image }}" alt="{{ selectedPose.sanskrit_name }} {{ selectedPose.english_name }}">
                    <div *ngIf="selectedPose.info != ''" 
                         class="row no-gutters justify-content-center">
                        <button class="btn displayPoseInfoCallToAction"
                                data-toggle="modal"
                                data-target="#poseInfoModal">Learn more + how-to</button>
                    </div>
            </div>
            <div class="col-lg-6 col-sm-10">
                <div class="pose">
                <a (click)="returnToConditions()"
                   style="text-decoration: underline;"> Back</a>

                <br />
                <br />
                
                <h2>{{ selectedPose.sanskrit_name }}</h2>  
                <h3>{{ selectedPose.english_name }}</h3>

                <br />
                <br />

                <h5 class="conditionsHeader">CONTRAINDICATING CONDITIONS</h5>
                <div *ngFor="let condition of contraindicatedConditions">
                    <p (click)="viewCondition(condition.id)"
                       class="conditionDisplay">{{ condition.name }}</p>
                </div>

                <br />
                <br />

                <h5 class="conditionsHeader">CONDITIONS HELPED</h5>
                <div *ngFor="let condition of indicatedConditions">
                    <p (click)="viewCondition(condition.id)"
                       class="conditionDisplay">{{ condition.name }}</p>
                </div>
            </div>
            </div>
        </div>
    </div>
    <hr>
    <button *ngIf="cameFrom==='poses'"
            (click)="returnToPoses()" 
            class="btn btn-primary">Return to poses</button>

    <button *ngIf="cameFrom==='conditions'"
            (click)="returnToConditions()"
            class="btn btn-primary">Return to results</button>


<!-- Pose info modal -->
<div class="modal fade" id="poseInfoModal" tabindex="-1" role="dialog" aria-labelledby="poseInfoModal" aria-hidden="true">
    <div class="modal-dialog modal-xl" role="document">
        <div class="modal-content">
          <div class="modal-header text-center">
            <h4 class="modal-title w-100" id="myModalLabel"><span class="aboutPoseHeader">{{selectedPose.sanskrit_name}}</span> <i> or </i> <span class="aboutPoseHeader">{{selectedPose.english_name}}</span></h4>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body" data-target="#modal">
            <p [innerHtml]="selectedPose.info | safeHtml"
               class="poseInfo"></p>
          </div>    
        </div>
    </div>
</div>
