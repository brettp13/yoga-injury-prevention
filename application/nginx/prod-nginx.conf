server {
    listen 80;
    server_name yip.guru www.yip.guru;
    
    client_max_body_size 500M;

    # Use Docker's embedded DNS so optional upstreams (e.g. kibana when the ELK
    # profile is disabled) are resolved at request time instead of at startup.
    # Without this, a missing optional upstream makes nginx fail to boot.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        include uwsgi_params;
        uwsgi_pass webapp:8000;
    }

    location /static {
        proxy_pass http://webapp:8001;
    }

    location /kibana/ {
        set $kibana_upstream kibana;
        rewrite ^/kibana/(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_pass http://$kibana_upstream:5601;
    }

    location /rabbit/ {
        proxy_set_header Host $host;
        proxy_pass http://rabbitmq:15672/;
    }
}
