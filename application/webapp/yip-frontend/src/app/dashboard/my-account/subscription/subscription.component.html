<h4>Subscription Status</h4>
<hr>
<table>
    <tr>
        <td>
            <p>Account status:</p>
        </td>
        <td>
            <p>{{authInfo.is_active}}</p>
        </td>
    </tr>
    <tr>
        <td>
            <p>Member since:</p>
        </td>
        <td>
            <p>{{authInfo.date_joined}}</p>
        </td>
    </tr>
</table>

<button class="btn btn-danger" data-toggle="modal" data-target="#cancelAccountModal">Cancel my account</button>

<!-- Are you sure you want to cancel modal -->
<div class="modal fade" id="cancelAccountModal" tabindex="-1" role="dialog" aria-labelledby="cancelAccountModal" aria-hidden="true">
    <div class="modal-dialog modal-xl" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title" id="myModalLabel">Cancel Account</h4>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body" data-target="#modal">
                <h4>But are you really sure?</h4>
                <div class="row">
                    <div class="col-6">
                        <button class="btn btn-primary">No.. Continue with my subscription</button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-danger">Yes.. Cancel my account</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
