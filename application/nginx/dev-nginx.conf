server {
    listen 80;
    server_name 127.0.0.1 www.yoga-injury-prevention.oppenheimer.us yoga-injury-prevention.oppenheimer.us;

    client_max_body_size 500M;

    location / {
        include uwsgi_params;
        uwsgi_pass webapp:8000;
    }

    location /static {
        proxy_pass http://webapp:8001;
    }

    location /kibana/ {
        proxy_set_header Host $host;
        proxy_pass http://kibana:5601/;
    }

    location /rabbit/ {
        proxy_set_header Host $host;
        proxy_pass http://rabbitmq:15672/;
    }
}
